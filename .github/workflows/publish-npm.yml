name: Publish to npm

on:
  workflow_run:
    workflows: ["Build Executables"]
    types: [completed]

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Validate npm version matches tag
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          TAG_VERSION="${TAG#v}"
          PKG_VERSION=$(node -p "require('./npm/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag $TAG does not match npm/package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Version check passed: $TAG_VERSION"

      - name: Publish to npm
        run: npm publish npm/ --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
