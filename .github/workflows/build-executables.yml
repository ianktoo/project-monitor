name: Build Executables

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (e.g. v0.3.2)"
        required: false
  release:
    types: [published]

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: pmon-linux-x86_64
            exe: pmon
            release_asset: pmon-linux-x86_64
            pyinstaller_extra: "--strip"
          - os: macos-latest
            artifact: pmon-macos-arm64
            exe: pmon
            release_asset: pmon-macos-arm64
            pyinstaller_extra: ""
          - os: windows-latest
            artifact: pmon-windows-x86_64
            exe: pmon.exe
            release_asset: pmon-windows-x86_64.exe
            pyinstaller_extra: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package and PyInstaller
        run: pip install -e . pyinstaller

      - name: Build executable
        run: >
          pyinstaller
          --onefile
          --name pmon
          --noupx
          ${{ matrix.pyinstaller_extra }}
          src/project_monitor/__main__.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.exe }}

      - name: Upload to release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "release" ]; then
            TAG="$GITHUB_REF_NAME"
          else
            TAG="$INPUT_TAG"
          fi
          cp "dist/${{ matrix.exe }}" "dist/${{ matrix.release_asset }}"
          gh release upload "$TAG" "dist/${{ matrix.release_asset }}" --clobber
