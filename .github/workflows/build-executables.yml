name: Build Executables

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (e.g. v0.3.1)"
        required: false
  release:
    types: [published]

jobs:
  build:
    name: Build (${{ matrix.artifact }})
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: pmon-linux-x86_64
            exe: pmon
          - os: macos-13
            artifact: pmon-macos-intel
            exe: pmon
          - os: macos-latest
            artifact: pmon-macos-arm64
            exe: pmon
          - os: windows-latest
            artifact: pmon-windows-x86_64
            exe: pmon.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and PyInstaller
        run: pip install -e . pyinstaller

      - name: Build executable
        run: pyinstaller --onefile --name pmon src/project_monitor/__main__.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.exe }}

      - name: Upload to release
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event_name == 'release' && github.ref_name || inputs.tag }}"
          gh release upload "$TAG" "dist/${{ matrix.exe }}#${{ matrix.artifact }}" --clobber
